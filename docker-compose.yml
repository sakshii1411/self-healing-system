services:

  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "8001:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import requests; requests.get(\"http://localhost:8000/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "8002:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
    depends_on:
      user-service:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus

  decision-engine:
    build: ./services/decision-engine
    container_name: decision-engine
    ports:
      - "8003:8000"
    restart: unless-stopped
    depends_on:
      - prometheus

  response-engine:
    build: ./services/response-engine
    container_name: response-engine
    ports:
      - "8004:8000"
    restart: unless-stopped
    depends_on:
      - decision-engine

  ml-anomaly-detector:
    build: ./services/ml-anomaly-detector
    container_name: ml-anomaly-detector
    ports:
      - "8005:8000"
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  grafana_data:
